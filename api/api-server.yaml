openapi: 3.0.3
info:
  title: Swarm Deploy API
  version: 0.1.0
  description: |
    MVP API for Swarm Deploy.
    Includes stack status and manual sync endpoint.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/stacks:
    get:
      operationId: listStacks
      responses:
        '200':
          description: List of tracked stacks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StacksResponse'
  /api/v1/sync:
    post:
      operationId: triggerSync
      responses:
        '202':
          description: Sync trigger accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
  /api/v1/assistant/chat:
    post:
      operationId: assistantChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
      responses:
        '200':
          description: Assistant long-poll response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChatResponse'
  /api/v1/events:
    get:
      operationId: listEvents
      responses:
        '200':
          description: Latest events from local history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventHistoryResponse'
  /api/v1/services:
    get:
      operationId: listServices
      responses:
        '200':
          description: Latest service metadata collected after successful deploys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesResponse'
  /api/v1/stacks/{stack}/services/{service}/status:
    get:
      operationId: getServiceStatus
      parameters:
        - in: path
          name: stack
          required: true
          schema:
            type: string
        - in: path
          name: service
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service status and current container metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
components:
  schemas:
    AssistantChatRequest:
      type: object
      properties:
        conversation_id:
          type: string
        request_id:
          type: string
        message:
          type: string
        wait_timeout_ms:
          type: integer
          format: int32
          minimum: 1
          maximum: 30000
    AssistantChatResponse:
      type: object
      required: [status, request_id, conversation_id]
      properties:
        status:
          type: string
          enum: [in_progress, completed, failed, rejected, disabled]
        request_id:
          type: string
        conversation_id:
          type: string
        answer:
          type: string
        error_message:
          type: string
        poll_after_ms:
          type: integer
          format: int32
          minimum: 1
    QueueResponse:
      type: object
      required: [queued]
      properties:
        queued:
          type: boolean
    EventHistoryResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventHistoryItem'
    EventHistoryItem:
      type: object
      required: [type, created_at, message]
      properties:
        type:
          type: string
        created_at:
          type: string
          format: date-time
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
    ServicesResponse:
      type: object
      required: [services]
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceInfo'
    ServiceInfo:
      type: object
      required: [name, stack, type, image]
      properties:
        name:
          type: string
        stack:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [application, monitoring, delivery, reverseProxy, database]
        image:
          type: string
    SyncInfo:
      type: object
      additionalProperties:
        type: string
    ServiceView:
      type: object
      required: [name, image, image_version]
      properties:
        name:
          type: string
        image:
          type: string
        image_version:
          type: string
        last_status:
          type: string
        last_deploy_at:
          type: string
          format: date-time
    ServiceStatusResponse:
      type: object
      required: [stack, service, image, requested_ram_bytes, requested_cpu_nano, limit_ram_bytes, limit_cpu_nano]
      properties:
        stack:
          type: string
        service:
          type: string
        image:
          type: string
        requested_ram_bytes:
          type: integer
          format: int64
          minimum: 0
        requested_cpu_nano:
          type: integer
          format: int64
          minimum: 0
        limit_ram_bytes:
          type: integer
          format: int64
          minimum: 0
        limit_cpu_nano:
          type: integer
          format: int64
          minimum: 0
    StackView:
      type: object
      required: [name, compose_file, last_status, services]
      properties:
        name:
          type: string
        compose_file:
          type: string
        last_status:
          type: string
        last_error:
          type: string
        last_commit:
          type: string
        last_deploy_at:
          type: string
          format: date-time
        source_digest:
          type: string
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceView'
    StacksResponse:
      type: object
      required: [stacks, sync]
      properties:
        stacks:
          type: array
          items:
            $ref: '#/components/schemas/StackView'
        sync:
          $ref: '#/components/schemas/SyncInfo'
