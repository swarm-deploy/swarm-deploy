openapi: 3.0.3
info:
  title: Swarm Deploy API
  version: 0.1.0
  description: |
    MVP API for Swarm Deploy.
    Includes stack status and manual sync endpoint.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/stacks:
    get:
      operationId: listStacks
      responses:
        '200':
          description: List of tracked stacks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StacksResponse'
  /api/v1/git/commits/{commit}:
    get:
      operationId: getGitCommit
      parameters:
        - in: path
          name: commit
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Git commit details by hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitCommitDetailsResponse'
  /api/v1/sync:
    post:
      operationId: triggerSync
      responses:
        '202':
          description: Sync trigger accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
  /api/v1/assistant/chat:
    post:
      operationId: assistantChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
      responses:
        '200':
          description: Assistant long-poll response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantChatResponse'
  /api/v1/events:
    get:
      operationId: listEvents
      parameters:
        - in: query
          name: severities
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/EventSeverity'
        - in: query
          name: categories
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/EventCategory'
      responses:
        '200':
          description: Latest events from local history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventHistoryResponse'
  /api/v1/services:
    get:
      operationId: listServices
      responses:
        '200':
          description: Latest service metadata collected after successful deploys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicesResponse'
  /api/v1/nodes:
    get:
      operationId: listNodes
      responses:
        '200':
          description: Current Docker Swarm nodes snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodesResponse'
  /api/v1/networks:
    get:
      operationId: listNetworks
      responses:
        '200':
          description: Current Docker networks snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworksResponse'
  /api/v1/secrets:
    get:
      operationId: listSecrets
      responses:
        '200':
          description: Current Docker Swarm secrets snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretsResponse'
  /api/v1/secrets/{name}:
    get:
      operationId: getSecretByName
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detailed secret metadata by name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretDetailsResponse'
  /api/v1/stacks/{stack}/services/{service}/status:
    get:
      operationId: getServiceStatus
      parameters:
        - in: path
          name: stack
          required: true
          schema:
            type: string
        - in: path
          name: service
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service status and compact runtime spec
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
  /api/v1/stacks/{stack}/services/{service}/deployments:
    get:
      operationId: listServiceDeployments
      parameters:
        - in: path
          name: stack
          required: true
          schema:
            type: string
        - in: path
          name: service
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 5
      responses:
        '200':
          description: Latest deployments for a stack service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDeploymentsResponse'
  /api/v1/search:
    get:
      operationId: search
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Search results for services, secrets, and stacks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
  /api/v1/users/me:
    get:
      operationId: getCurrentUser
      responses:
        '200':
          description: Current authenticated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
components:
  schemas:
    AssistantChatRequest:
      type: object
      properties:
        conversation_id:
          type: string
        request_id:
          type: string
        message:
          type: string
        wait_timeout_ms:
          type: integer
          format: int32
          minimum: 1
          maximum: 30000
    AssistantChatResponse:
      type: object
      required: [status, request_id, conversation_id]
      properties:
        status:
          type: string
          enum: [in_progress, completed, failed, rejected, disabled]
        request_id:
          type: string
        conversation_id:
          type: string
        answer:
          type: string
        error_message:
          type: string
        poll_after_ms:
          type: integer
          format: int32
          minimum: 1
    QueueResponse:
      type: object
      required: [queued]
      properties:
        queued:
          type: boolean
    EventHistoryResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventHistoryItem'
    EventSeverity:
      type: string
      enum: [info, warn, error, alert]
    EventCategory:
      type: string
      enum: [sync, security]
    EventHistoryItem:
      type: object
      required: [type, severity, category, created_at, message]
      properties:
        type:
          type: string
        severity:
          $ref: '#/components/schemas/EventSeverity'
        category:
          $ref: '#/components/schemas/EventCategory'
        created_at:
          type: string
          format: date-time
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
    ServicesResponse:
      type: object
      required: [services]
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceInfo'
    ServiceInfo:
      type: object
      required: [name, stack, type, type_title, image, image_version]
      properties:
        name:
          type: string
        stack:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [application, monitoring, delivery, reverseProxy, database]
        type_title:
          type: string
          description: Human-readable title for the service type enum.
        image:
          type: string
        image_version:
          type: string
          description: Tag or short digest string derived from the image reference.
        repository_url:
          type: string
        web_routes:
          type: array
          items:
            $ref: '#/components/schemas/WebRoute'
    WebRoute:
      type: object
      required: [domain, address, port]
      properties:
        domain:
          type: string
        address:
          type: string
        port:
          type: string
    NodesResponse:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/NodeInfo'
    NetworksResponse:
      type: object
      required: [networks]
      properties:
        networks:
          type: array
          items:
            $ref: '#/components/schemas/NetworkInfo'
    NodeInfo:
      type: object
      required: [id, hostname, status, availability, manager_status, engine_version, addr]
      properties:
        id:
          type: string
        hostname:
          type: string
        status:
          type: string
        availability:
          type: string
        manager_status:
          type: string
        engine_version:
          type: string
        addr:
          type: string
    NetworkInfo:
      type: object
      required: [id, name, scope, driver, internal, attachable, ingress]
      properties:
        id:
          type: string
        name:
          type: string
        scope:
          type: string
        driver:
          type: string
        internal:
          type: boolean
        attachable:
          type: boolean
        ingress:
          type: boolean
        labels:
          type: object
          additionalProperties:
            type: string
        options:
          type: object
          additionalProperties:
            type: string
    SecretsResponse:
      type: object
      required: [secrets]
      properties:
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretInfo'
    SecretInfo:
      type: object
      required: [id, name, version_id, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        version_id:
          type: integer
          format: int64
          minimum: 0
        created_at:
          type: string
          format: date-time
        external:
          $ref: '#/components/schemas/SecretExternalInfo'
    SecretDetailsResponse:
      type: object
      required: [id, name, version_id, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        version_id:
          type: integer
          format: int64
          minimum: 0
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        driver:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        external:
          $ref: '#/components/schemas/SecretExternalInfo'
    SecretExternalInfo:
      type: object
      properties:
        path:
          type: string
        version_id:
          type: string
    SyncInfo:
      type: object
      additionalProperties:
        type: string
    GitCommitDetailsResponse:
      type: object
      required: [full_hash, author, date, changed_files]
      properties:
        full_hash:
          type: string
        author:
          type: string
        date:
          type: string
          format: date-time
        changed_files:
          type: array
          items:
            type: string
    ServiceView:
      type: object
      required: [name, image, image_version]
      properties:
        name:
          type: string
        image:
          type: string
        image_version:
          type: string
        last_status:
          type: string
        last_deploy_at:
          type: string
          format: date-time
    ServiceStatusResponse:
      type: object
      required: [stack, service, spec]
      properties:
        stack:
          type: string
        service:
          type: string
        spec:
          $ref: '#/components/schemas/ServiceSpecResponse'
    ServiceSpecResponse:
      type: object
      required: [image, mode, replicas, requested_ram_bytes, requested_cpu_nano, limit_ram_bytes, limit_cpu_nano]
      properties:
        image:
          type: string
        mode:
          type: string
        replicas:
          type: integer
          format: int64
          minimum: 0
        requested_ram_bytes:
          type: integer
          format: int64
          minimum: 0
        requested_cpu_nano:
          type: integer
          format: int64
          minimum: 0
        limit_ram_bytes:
          type: integer
          format: int64
          minimum: 0
        limit_cpu_nano:
          type: integer
          format: int64
          minimum: 0
        labels:
          $ref: '#/components/schemas/ServiceSpecLabelsResponse'
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/ServiceSpecSecretResponse'
        network:
          type: array
          items:
            $ref: '#/components/schemas/ServiceSpecNetworkResponse'
    ServiceSpecLabelsResponse:
      type: object
      properties:
        docker:
          $ref: '#/components/schemas/ServiceSpecLabelGroupResponse'
        custom:
          $ref: '#/components/schemas/ServiceSpecLabelGroupResponse'
    ServiceSpecLabelGroupResponse:
      type: object
      additionalProperties:
        type: string
    ServiceSpecSecretResponse:
      type: object
      required: [secret_name]
      properties:
        secret_id:
          type: string
        secret_name:
          type: string
        target:
          type: string
    ServiceSpecNetworkResponse:
      type: object
      required: [target]
      properties:
        target:
          type: string
        aliases:
          type: array
          items:
            type: string
    ServiceDeploymentStatus:
      type: string
      enum: [success, failed]
    ServiceDeploymentResponse:
      type: object
      required: [created_at, status, image, image_version]
      properties:
        created_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ServiceDeploymentStatus'
        image:
          type: string
        image_version:
          type: string
        message:
          type: string
        commit:
          type: string
    ServiceDeploymentsResponse:
      type: object
      required: [deployments]
      properties:
        deployments:
          type: array
          items:
            $ref: '#/components/schemas/ServiceDeploymentResponse'
    StackView:
      type: object
      required: [name, compose_file, last_status]
      properties:
        name:
          type: string
        compose_file:
          type: string
        last_status:
          type: string
        last_error:
          type: string
        last_commit:
          type: string
        last_deploy_at:
          type: string
          format: date-time
        source_digest:
          type: string
    StacksResponse:
      type: object
      required: [stacks, sync]
      properties:
        stacks:
          type: array
          items:
            $ref: '#/components/schemas/StackView'
        sync:
          $ref: '#/components/schemas/SyncInfo'
    SearchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
    SearchResult:
      type: object
      required: [kind, match, label]
      properties:
        kind:
          type: string
          enum: [service, secret, stack]
        match:
          type: string
          enum: [service_name, service_web_route, secret_name, stack_name]
        label:
          type: string
        stack:
          type: string
        service:
          type: string
        secret_name:
          type: string
    CurrentUserResponse:
      type: object
      required: [name]
      properties:
        name:
          type: string
