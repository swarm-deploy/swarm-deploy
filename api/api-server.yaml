openapi: 3.0.3
info:
  title: Swarm Deploy API
  version: 0.1.0
  description: |
    MVP API for Swarm Deploy.
    Includes stack status and manual sync endpoint.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/stacks:
    get:
      operationId: listStacks
      responses:
        '200':
          description: List of tracked stacks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StacksResponse'
  /api/v1/sync:
    post:
      operationId: triggerSync
      responses:
        '202':
          description: Sync trigger accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
  /api/v1/events:
    get:
      operationId: listEvents
      responses:
        '200':
          description: Latest events from local history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventHistoryResponse'
  /api/v1/stacks/{stack}/services/{service}/status:
    get:
      operationId: getServiceStatus
      parameters:
        - in: path
          name: stack
          required: true
          schema:
            type: string
        - in: path
          name: service
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service status and current container metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatusResponse'
components:
  schemas:
    QueueResponse:
      type: object
      required: [queued]
      properties:
        queued:
          type: boolean
    EventHistoryResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventHistoryItem'
    EventHistoryItem:
      type: object
      required: [type, created_at, message]
      properties:
        type:
          type: string
        created_at:
          type: string
          format: date-time
        message:
          type: string
        stack:
          type: string
        commit:
          type: string
        error:
          type: string
    SyncInfo:
      type: object
      additionalProperties:
        type: string
    ServiceView:
      type: object
      required: [name]
      properties:
        name:
          type: string
        image:
          type: string
        image_version:
          type: string
        last_status:
          type: string
        last_deploy_at:
          type: string
          format: date-time
    ServiceStatusResponse:
      type: object
      required: [stack, service, image, requested_ram_bytes, requested_cpu_nano, limit_ram_bytes, limit_cpu_nano]
      properties:
        stack:
          type: string
        service:
          type: string
        image:
          type: string
        requested_ram_bytes:
          type: integer
          format: int64
          minimum: 0
        requested_cpu_nano:
          type: integer
          format: int64
          minimum: 0
        limit_ram_bytes:
          type: integer
          format: int64
          minimum: 0
        limit_cpu_nano:
          type: integer
          format: int64
          minimum: 0
    StackView:
      type: object
      required: [name, compose_file, last_status, services]
      properties:
        name:
          type: string
        compose_file:
          type: string
        last_status:
          type: string
        last_error:
          type: string
        last_commit:
          type: string
        last_deploy_at:
          type: string
          format: date-time
        source_digest:
          type: string
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceView'
    StacksResponse:
      type: object
      required: [stacks, sync]
      properties:
        stacks:
          type: array
          items:
            $ref: '#/components/schemas/StackView'
        sync:
          $ref: '#/components/schemas/SyncInfo'
