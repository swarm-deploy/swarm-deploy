<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swarm Deploy</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <main class="layout">
    <header class="topbar">
      <div>
        <p class="eyebrow">GitOps for Docker Swarm</p>
        <h1>Swarm Deploy</h1>
      </div>
      <div class="actions">
        <button id="show-events" type="button">Event history</button>
        <button id="sync-now" type="button">Sync now</button>
      </div>
    </header>
    <section class="status-panel">
      <p id="sync-status">Loading...</p>
    </section>
    <section class="services-link-panel">
      <a class="button-link" href="/ui/services.html">services</a>
    </section>
    <section>
      <div id="stacks" class="stack-grid"></div>
    </section>
  </main>
  <div id="service-status-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-overlay" data-close-modal="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="service-status-title">
      <div class="modal-header">
        <h2 id="service-status-title">Service status</h2>
        <button id="service-status-close" class="modal-close" type="button" aria-label="Close modal">x</button>
      </div>
      <div id="service-status-body" class="modal-body"></div>
    </div>
  </div>
  <div id="event-history-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-overlay" data-close-event-history="true"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="event-history-title">
      <div class="modal-header">
        <h2 id="event-history-title">Event history</h2>
        <button id="event-history-close" class="modal-close" type="button" aria-label="Close modal">x</button>
      </div>
      <div id="event-history-body" class="modal-body"></div>
    </div>
  </div>
  <button
    id="assistant-open"
    class="assistant-fab hidden"
    type="button"
    aria-label="Open assistant chat"
  >
    AI
  </button>
  <div id="assistant-chat-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-overlay" data-close-assistant="true"></div>
    <div class="modal-card assistant-chat-card" role="dialog" aria-modal="true" aria-labelledby="assistant-chat-title">
      <div class="modal-header">
        <h2 id="assistant-chat-title">Assistant</h2>
        <button id="assistant-chat-close" class="modal-close" type="button" aria-label="Close assistant">x</button>
      </div>
      <div id="assistant-chat-body" class="modal-body assistant-chat-body">
        <p class="meta">Assistant is ready.</p>
      </div>
      <form id="assistant-chat-form" class="assistant-chat-form">
        <input
          id="assistant-chat-input"
          type="text"
          placeholder="Ask about services, events, or sync issues..."
          autocomplete="off"
        />
        <button id="assistant-chat-send" type="submit">Send</button>
      </form>
    </div>
  </div>
  <script src="/ui/assistant-availability.js" defer></script>
  <script src="/ui/assistant.js" defer></script>
  <script src="/ui/app.js" defer></script>
</body>
</html>
